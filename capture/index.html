<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00e5a0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Receipt Capture</title>
<link rel="manifest" href="manifest.json">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a14;
    --surface: #13131f;
    --surface2: #1c1c2e;
    --accent: #00e5a0;
    --text: #f0f0f5;
    --text2: #8888aa;
    --radius: 16px;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    gap: 0;
    position: relative;
  }

  .logo {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
    text-align: center;
  }
  .title {
    font-size: 26px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 6px;
  }
  .sub {
    font-size: 14px;
    color: var(--text2);
    text-align: center;
    margin-bottom: 52px;
    line-height: 1.5;
  }

  /* Big camera button */
  .cam-btn {
    width: 190px;
    height: 190px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    box-shadow: 0 0 0 14px rgba(0,229,160,0.1), 0 0 0 28px rgba(0,229,160,0.05);
    transition: transform 0.1s, box-shadow 0.15s;
    margin-bottom: 40px;
    flex-shrink: 0;
  }
  .cam-btn:active {
    transform: scale(0.92);
    box-shadow: 0 0 0 6px rgba(0,229,160,0.1);
  }
  .cam-icon { font-size: 54px; }
  .cam-label { font-size: 13px; font-weight: 700; color: #0a0a14; letter-spacing: 0.06em; }

  /* Multi receipts button - unobtrusive */
  .multi-btn {
    background: var(--surface2);
    border: 1.5px solid #2a2a40;
    border-radius: 20px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: border-color 0.2s, color 0.2s;
    margin-bottom: 16px;
  }
  .multi-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }
  .multi-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text2);
    transition: background 0.2s;
  }
  .multi-btn.active .multi-dot { background: var(--accent); }

  /* Session count - only shows after first capture in multi mode */
  .session-count {
    font-size: 13px;
    color: var(--text2);
    text-align: center;
    min-height: 20px;
  }
  .session-count span { color: var(--accent); font-weight: 700; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 56px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--accent);
    color: #0a0a14;
    padding: 13px 24px;
    border-radius: 30px;
    font-size: 15px;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── ADD ANOTHER POPUP ── */
  .popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    padding: 0 0 32px;
  }
  .popup-overlay.show {
    opacity: 1;
    pointer-events: all;
  }
  .popup-card {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 28px 24px 24px;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transform: translateY(20px);
    transition: transform 0.2s;
  }
  .popup-overlay.show .popup-card { transform: translateY(0); }

  .popup-title {
    font-size: 17px;
    font-weight: 700;
    text-align: center;
  }
  .popup-sub {
    font-size: 13px;
    color: var(--text2);
    text-align: center;
    margin-top: -6px;
  }
  .popup-count {
    text-align: center;
    font-size: 13px;
    color: var(--text2);
  }
  .popup-count span { color: var(--accent); font-weight: 700; }

  .popup-btn-yes {
    background: var(--accent);
    color: #0a0a14;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.15s;
  }
  .popup-btn-yes:active { opacity: 0.8; }

  .popup-btn-done {
    background: var(--surface2);
    color: var(--text2);
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s;
  }
  .popup-btn-done:active { background: #2a2a40; }

  .note {
    position: fixed;
    bottom: 12px;
    left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    color: #44445a;
    padding: 0 24px;
  }

  input[type="file"] { display: none; }
</style>
</head>
<body>

<div class="logo">family.budget</div>
<div class="title">Quick Capture</div>
<div class="sub">Tap to photograph a receipt.<br>Saves instantly to your inbox.</div>

<button class="cam-btn" id="cam-btn" onclick="captureReceipt()">
  <span class="cam-icon">📷</span>
  <span class="cam-label">TAP TO CAPTURE</span>
</button>

<!-- Gallery picker button -->
<button onclick="pickFromGallery()" style="background:var(--surface2);border:1.5px solid #2a2a40;border-radius:12px;padding:13px 24px;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:16px;transition:border-color 0.2s">
  🖼️ Pick from gallery
</button>

<button class="multi-btn" id="multi-btn" onclick="toggleMulti()">
  <div class="multi-dot"></div>
  Add multiple receipts
</button>

<div class="session-count" id="session-count"></div>

<!-- Add Another popup (multi mode only) -->
<div class="popup-overlay" id="popup">
  <div class="popup-card">
    <div class="popup-title">✓ Receipt captured</div>
    <div class="popup-sub">Add another receipt?</div>
    <div class="popup-count">Session total: <span id="popup-count">0</span> receipt(s)</div>
    <button class="popup-btn-yes" onclick="addAnother()">📷 Yes, add another</button>
    <button class="popup-btn-done" onclick="doneCapturing()">Done</button>
  </div>
</div>

<input type="file" id="file-input" accept="image/*" capture="environment" onchange="photoTaken(this)">
<input type="file" id="gallery-input" accept="image/*" multiple onchange="photoTaken(this)">

<div class="toast" id="toast">✓ Receipt captured</div>

<div class="note">Photos sync to your OneDrive Receipts inbox for automatic processing.</div>

<script>
let multiMode = false;
let sessionCount = 0;

function toggleMulti() {
  multiMode = !multiMode;
  const btn = document.getElementById('multi-btn');
  btn.classList.toggle('active', multiMode);
  btn.querySelector('.multi-dot').style.background = multiMode ? 'var(--accent)' : '';
  if (!multiMode) {
    document.getElementById('session-count').textContent = '';
    sessionCount = 0;
  }
}

function captureReceipt() {
  const input = document.getElementById('file-input');
  input.value = '';
  input.click();
}

function pickFromGallery() {
  const input = document.getElementById('gallery-input');
  input.value = '';
  input.click();
}

function photoTaken(input) {
  const files = input.files;
  if (!files || files.length === 0) return;

  saveToQueue(Array.from(files));
  sessionCount += files.length;
  input.value = '';

  if (multiMode) {
    // Show add another popup
    document.getElementById('popup-count').textContent = sessionCount;
    document.getElementById('popup').classList.add('show');
  } else {
    // Single mode — small toast, then done
    showToast('✓ Receipt captured');
  }

  updateSessionCount();
}

function addAnother() {
  document.getElementById('popup').classList.remove('show');
  setTimeout(() => captureReceipt(), 200);
}

function doneCapturing() {
  document.getElementById('popup').classList.remove('show');
  showToast('✓ ' + sessionCount + ' receipt' + (sessionCount !== 1 ? 's' : '') + ' saved');
  sessionCount = 0;
  updateSessionCount();
  multiMode = false;
  document.getElementById('multi-btn').classList.remove('active');
}

function updateSessionCount() {
  const el = document.getElementById('session-count');
  if (multiMode && sessionCount > 0) {
    el.innerHTML = '<span>' + sessionCount + '</span> receipt' + (sessionCount !== 1 ? 's' : '') + ' captured this session';
  } else {
    el.textContent = '';
  }
}

function saveToQueue(files) {
  const queue = JSON.parse(localStorage.getItem('fb_capture_queue') || '[]');
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      queue.push({
        name: 'receipt_' + Date.now() + '_' + Math.random().toString(36).slice(2,6) + '.jpg',
        data: e.target.result,
        captured: new Date().toISOString()
      });
      localStorage.setItem('fb_capture_queue', JSON.stringify(queue));
    };
    reader.readAsDataURL(file);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(e => console.log('SW:', e));
}
</script>
</body>
</html>
